spring.application.name=medicare-smart-healthcare
server.port=8080

# Default: H2 in-memory for quick running. For MySQL, set SPRING_PROFILES_ACTIVE=mysql and env vars below.
spring.datasource.url=jdbc:h2:mem:medicaredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Must be at least 32 chars for HS256. Override in production: JWT_SECRET=...
app.jwt.secret=${JWT_SECRET:medicaresmarthealthcaredemosecretkeypleasechange123}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
